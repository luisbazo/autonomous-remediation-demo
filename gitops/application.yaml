apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: quarkus-memory-leak-app
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/luisbazo/autonomous-remediation-demo.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

