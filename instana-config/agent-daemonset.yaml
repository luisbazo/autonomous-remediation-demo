apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: instana-agent
  namespace: instana-agent
  labels:
    app: instana-agent
spec:
  selector:
    matchLabels:
      app: instana-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: instana-agent
    spec:
      serviceAccountName: instana-agent
      hostNetwork: true
      hostPID: true
      hostIPC: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: instana-agent
        image: icr.io/instana/agent:latest
        imagePullPolicy: Always
        env:
        - name: INSTANA_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: instana-agent
              key: key
        - name: INSTANA_AGENT_ENDPOINT
          value: "ingress-red-saas.instana.io"
        - name: INSTANA_AGENT_ENDPOINT_PORT
          value: "443"
        - name: INSTANA_AGENT_ZONE
          value: "demo-zone"
        - name: INSTANA_AGENT_MODE
          value: "APM"
        - name: INSTANA_AGENT_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev
          mountPath: /dev
        - name: run
          mountPath: /run
        - name: var-run
          mountPath: /var/run
        - name: sys
          mountPath: /sys
        - name: var-log
          mountPath: /var/log
        - name: machine-id
          mountPath: /etc/machine-id
        - name: configuration
          mountPath: /opt/instana/agent/etc/instana/configuration.yaml
          subPath: configuration.yaml
        livenessProbe:
          httpGet:
            path: /status
            port: 42699
          initialDelaySeconds: 300
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1024Mi"
            cpu: "1000m"
      volumes:
      - name: dev
        hostPath:
          path: /dev
      - name: run
        hostPath:
          path: /run
      - name: var-run
        hostPath:
          path: /var/run
      - name: sys
        hostPath:
          path: /sys
      - name: var-log
        hostPath:
          path: /var/log
      - name: machine-id
        hostPath:
          path: /etc/machine-id
      - name: configuration
        configMap:
          name: instana-agent-config

