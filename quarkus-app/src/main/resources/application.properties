# Application Configuration
quarkus.application.name=quarkus-memory-leak-app
quarkus.application.version=1.0.0

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0

# Logging Configuration
quarkus.log.level=INFO
quarkus.log.category."com.ibm.demo".level=DEBUG
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.json=false

# Health Check Configuration
quarkus.smallrye-health.root-path=/q/health
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# Metrics Configuration
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry Configuration for Instana
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
quarkus.otel.service.name=quarkus-memory-leak-app
quarkus.otel.traces.enabled=true
quarkus.otel.metrics.enabled=true

# Container Image Configuration
quarkus.container-image.build=true
quarkus.container-image.push=false
quarkus.container-image.group=demo
quarkus.container-image.name=quarkus-memory-leak-app
quarkus.container-image.tag=latest

# Kubernetes/OpenShift Configuration
quarkus.kubernetes.deployment-target=openshift
quarkus.openshift.expose=true
quarkus.openshift.labels."app"=quarkus-memory-leak-app
quarkus.openshift.labels."version"=1.0.0
quarkus.openshift.annotations."app.openshift.io/connects-to"=instana-agent

# Resource Limits (intentionally low to trigger memory issues faster)
quarkus.openshift.resources.requests.memory=256Mi
quarkus.openshift.resources.requests.cpu=100m
quarkus.openshift.resources.limits.memory=512Mi
quarkus.openshift.resources.limits.cpu=500m

# JVM Configuration for memory leak detection
quarkus.native.additional-build-args=-J-Xmx512m,-J-Xms256m

# Development Mode
%dev.quarkus.http.port=8080
%dev.quarkus.log.console.json=false

