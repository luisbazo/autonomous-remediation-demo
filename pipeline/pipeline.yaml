apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: quarkus-memory-leak-app-pipeline
  namespace: demo-namespace
spec:
  params:
    - name: git-url
      type: string
      description: Git repository URL
      default: https://github.com/luisbazo/autonomous-remediation-demo.git
    - name: git-revision
      type: string
      description: Git revision to build
      default: main
    - name: image-name
      type: string
      description: Container image name
      default: default-route-openshift-image-registry.apps.itz-74esdv.infra01-lb.fra02.techzone.ibm.com/demo-namespace/quarkus-memory-leak-app
    - name: image-tag
      type: string
      description: Container image tag
      default: latest
  
  workspaces:
    - name: shared-workspace
      description: Workspace for source code and build artifacts
  
  tasks:
    - name: fetch-repository
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: shared-workspace
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
    
    - name: build-application
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - fetch-repository
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: GOALS
          value:
            - clean
            - package
            - -DskipTests
        - name: SUBDIRECTORY
          value: quarkus-app
        - name: MAVEN_MIRROR_URL
          value: ""
    
    - name: run-tests
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - build-application
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: GOALS
          value:
            - test
        - name: SUBDIRECTORY
          value: quarkus-app
        - name: MAVEN_MIRROR_URL
          value: ""
    
    - name: build-and-push-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - run-tests
      workspaces:
        - name: source
          workspace: shared-workspace
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.image-tag)
        - name: DOCKERFILE
          value: ./quarkus-app/Dockerfile
        - name: CONTEXT
          value: ./quarkus-app
        - name: TLSVERIFY
          value: "false"

